<script>
// ═══════════════════════════════════════════════════════════════════════════
//  JS_Health.html  |  Project Health Check Dashboard  (Enhanced)
//
//  Visualisation model per card:
//    • Progress vs Expected bar — actual fill + expected-position marker
//    • Manpower efficiency bar  — weighted by task due-date span from start
//    • Velocity badge           — ratio of actual/expected progress
//    • Task stat pills          — total / approved / pending / overdue
//
//  KPI pills are clickable to filter cards by RAG status.
// ═══════════════════════════════════════════════════════════════════════════

var _healthAllProjects_  = [];
var _healthActiveFilter_ = 'all';

function loadHealthPage() {
  var wrap = document.getElementById('page-health');
  if (!wrap) return;

  document.getElementById('healthSummaryRow').innerHTML = _healthSkeleton_();
  document.getElementById('healthCardsWrap').innerHTML  = '';

  runServer('getProjectHealth')
    .then(function(data) {
      _healthAllProjects_  = data.projects || [];
      _healthActiveFilter_ = 'all';
      _renderHealthSummary_(data.summary);
      _renderHealthCards_(_healthAllProjects_);
    })
    .catch(function(err) {
      document.getElementById('healthSummaryRow').innerHTML = '';
      document.getElementById('healthCardsWrap').innerHTML =
        '<div class="empty-state"><i class="fas fa-triangle-exclamation"></i>' +
        '<p>Could not load health data</p>' +
        '<small>' + (err && err.message ? err.message : '') + '</small></div>';
    });
}

// ─── Summary KPI pills (clickable to filter) ─────────────────────────────────

function _renderHealthSummary_(s) {
  var total = (s.red || 0) + (s.amber || 0) + (s.green || 0) + (s.hold || 0);
  document.getElementById('healthSummaryRow').innerHTML =
    _healthKpi_('fa-layer-group',          total,   'All Projects', '#4f46e5', '#ede9fe', 'all')   +
    _healthKpi_('fa-circle-exclamation',   s.red,   'Critical',     '#ef4444', '#fef2f2', 'red')   +
    _healthKpi_('fa-triangle-exclamation', s.amber, 'At Risk',      '#f59e0b', '#fffbeb', 'amber') +
    _healthKpi_('fa-circle-check',         s.green, 'On Track',     '#10b981', '#ecfdf5', 'green') +
    _healthKpi_('fa-pause-circle',         s.hold,  'On Hold',      '#6b7280', '#f3f4f6', 'hold');
}

function _healthKpi_(icon, count, label, color, bg, rag) {
  return '<div class="health-kpi hc-kpi-btn" data-rag="' + rag + '" ' +
    'style="background:' + bg + ';border-left:4px solid ' + color + ';cursor:pointer" ' +
    'onclick="_filterHealth_(\'' + rag + '\')" title="Filter: ' + label + '">' +
    '<i class="fas ' + icon + '" style="color:' + color + ';font-size:20px"></i>' +
    '<div>' +
      '<div class="health-kpi-val" style="color:' + color + '">' + count + '</div>' +
      '<div class="health-kpi-label">' + label + '</div>' +
    '</div>' +
    '</div>';
}

function _filterHealth_(rag) {
  _healthActiveFilter_ = rag;
  // Highlight active KPI pill
  document.querySelectorAll('.hc-kpi-btn').forEach(function(el) {
    el.style.opacity = (el.dataset.rag === rag || rag === 'all') ? '1' : '0.45';
  });
  var filtered = rag === 'all'
    ? _healthAllProjects_
    : _healthAllProjects_.filter(function(p) { return p.rag === rag; });
  _renderHealthCards_(filtered);
}

// ─── Project cards grid ───────────────────────────────────────────────────────

function _renderHealthCards_(projects) {
  var wrap = document.getElementById('healthCardsWrap');
  if (!projects || projects.length === 0) {
    wrap.innerHTML = emptyState('fa-heart-pulse', 'No projects', 'No projects match this filter.');
    return;
  }
  var html = projects.map(function(p) { return _healthCard_(p); }).join('');
  wrap.innerHTML = '<div class="health-grid">' + html + '</div>';
}

// ─── Individual health card ───────────────────────────────────────────────────

function _healthCard_(p) {
  var ragMeta = _ragMeta_(p.rag);

  // ── Compute fill colour based on efficiency vs expected ───────────────────
  var fillColor;
  if (p.rag === 'hold') {
    fillColor = '#9ca3af';
  } else if (p.expectedPct === null || p.expectedPct === undefined) {
    fillColor = ragMeta.color;           // no timeline data — use RAG colour
  } else if (p.pct >= p.expectedPct) {
    fillColor = '#10b981';               // ahead or exactly on track → green
  } else if (p.pct >= p.expectedPct * 0.75) {
    fillColor = '#f59e0b';               // within 25% of target → amber
  } else {
    fillColor = '#ef4444';               // significantly behind → red
  }

  // ── Progress vs Expected bar ──────────────────────────────────────────────
  var showMarker = (
    p.expectedPct !== null && p.expectedPct !== undefined &&
    p.expectedPct > 3 && p.expectedPct < 97
  );
  var markerHtml = '';
  if (showMarker) {
    markerHtml =
      '<div style="position:absolute;top:-6px;left:' + p.expectedPct + '%;' +
      'transform:translateX(-50%);width:2px;height:22px;background:#1e293b;' +
      'border-radius:1px;z-index:2">' +
        '<div style="position:absolute;top:-17px;left:50%;transform:translateX(-50%);' +
        'font-size:9px;color:#1e293b;white-space:nowrap;font-weight:700;' +
        'background:var(--surface);padding:0 3px;border-radius:2px;line-height:1.5">' +
          p.expectedPct + '% exp' +
        '</div>' +
      '</div>';
  }

  var progressSection = '';
  if (p.totalTasks > 0) {
    progressSection =
      '<div class="hc-section-label">Task Completion</div>' +
      '<div style="position:relative;height:10px;background:var(--border);' +
      'border-radius:100px;margin:8px 0 22px;overflow:visible">' +
        '<div style="position:absolute;left:0;top:0;height:100%;width:' + p.pct + '%;' +
        'background:' + fillColor + ';border-radius:100px;transition:width .5s ease;z-index:1"></div>' +
        markerHtml +
      '</div>' +
      '<div class="hc-prog-labels">' +
        '<span style="font-weight:700;color:' + fillColor + '">' + p.pct + '% done</span>' +
        (showMarker
          ? '<span style="color:var(--text-3);font-size:11px">' +
              (p.pct >= p.expectedPct ? '↑ Ahead' : (p.pct >= p.expectedPct * 0.75 ? '~ Near target' : '↓ Behind')) +
            '</span>'
          : '') +
        '<span style="color:var(--text-3)">' + p.approvedTasks + ' / ' + p.totalTasks + ' tasks</span>' +
      '</div>';
  }

  // ── Manpower efficiency bar ───────────────────────────────────────────────
  var manpowerSection = '';
  if (p.totalManpowerDays > 0) {
    var mpColor = p.rag === 'hold' ? '#9ca3af'
      : p.manpowerPct >= (p.expectedPct || 0) ? '#10b981'
      : p.manpowerPct >= (p.expectedPct || 0) * 0.75 ? '#f59e0b'
      : '#ef4444';

    manpowerSection =
      '<div class="hc-section-label" style="margin-top:12px">' +
        'Manpower Efficiency' +
        '<span style="float:right;font-weight:700;color:' + mpColor + '">' + p.manpowerPct + '%</span>' +
      '</div>' +
      '<div style="height:6px;background:var(--border);border-radius:100px;margin:6px 0 5px;overflow:hidden">' +
        '<div style="height:100%;width:' + p.manpowerPct + '%;background:' + mpColor + ';' +
        'border-radius:100px;transition:width .5s ease"></div>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--text-3);margin-bottom:10px">' +
        p.completedManpowerDays + ' of ' + p.totalManpowerDays + ' task-days completed' +
      '</div>';
  }

  // ── Velocity badge ────────────────────────────────────────────────────────
  var velocityHtml = '';
  if (p.velocity !== null && p.velocity !== undefined && p.rag !== 'hold') {
    var vLabel, vColor, vBg, vIcon;
    if (p.velocity >= 1.0) {
      vLabel = 'Ahead of schedule'; vColor = '#065f46'; vBg = '#d1fae5'; vIcon = 'fa-arrow-trend-up';
    } else if (p.velocity >= 0.8) {
      vLabel = 'On track';          vColor = '#78350f'; vBg = '#fef3c7'; vIcon = 'fa-arrow-right';
    } else if (p.velocity >= 0.6) {
      vLabel = 'Slightly behind';   vColor = '#92400e'; vBg = '#fffbeb'; vIcon = 'fa-arrow-trend-down';
    } else {
      vLabel = 'Behind schedule';   vColor = '#991b1b'; vBg = '#fee2e2'; vIcon = 'fa-arrow-trend-down';
    }
    velocityHtml =
      '<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;' +
      'border-radius:var(--r-full);background:' + vBg + ';color:' + vColor + ';' +
      'font-size:11px;font-weight:700;margin-bottom:10px">' +
        '<i class="fas ' + vIcon + '"></i> ' +
        p.velocity.toFixed(2) + 'x &nbsp;·&nbsp; ' + vLabel +
      '</div>';
  }

  // ── Task stat pills ───────────────────────────────────────────────────────
  var taskStats = p.totalTasks > 0
    ? _hcStat_('fa-list-check',           p.totalTasks,      'Total',   '#6b7280') +
      _hcStat_('fa-circle-check',         p.approvedTasks,   'Done',    '#10b981') +
      _hcStat_('fa-hourglass-half',       p.pendingApproval, 'Pending', '#f59e0b') +
      _hcStat_('fa-triangle-exclamation', p.overdueTasks,    'Overdue', '#ef4444')
    : '<div style="font-size:12px;color:var(--text-4)">No tasks added yet</div>';

  // ── Assemble card ─────────────────────────────────────────────────────────
  return (
    '<div class="health-card health-card-' + p.rag + '">' +

      // Header: RAG pill + deadline chip
      '<div class="health-card-header">' +
        '<span class="health-rag-pill" style="background:' + ragMeta.bg + ';color:' + ragMeta.color + '">' +
          '<i class="fas ' + ragMeta.icon + '"></i> ' + ragMeta.label +
        '</span>' +
        _deadlineChip_(p.daysToDeadline) +
      '</div>' +

      // Project name
      '<div class="health-proj-name">' + escape(p.name) + '</div>' +

      // Client + team lead
      '<div class="health-proj-client" style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px">' +
        '<span><i class="fas fa-briefcase" style="margin-right:4px;color:var(--text-4)"></i>' +
          escape(p.client || '—') + '</span>' +
        (p.teamLead
          ? '<span><i class="fas fa-user-tie" style="margin-right:4px;color:var(--text-4)"></i>' +
              escape(p.teamLead) + '</span>'
          : '') +
      '</div>' +

      // Visualisations
      progressSection +
      manpowerSection +
      velocityHtml +

      // Task stats
      '<div class="health-stats-row">' + taskStats + '</div>' +

    '</div>'
  );
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function _hcStat_(icon, value, label, color) {
  return '<div class="hc-stat">' +
    '<i class="fas ' + icon + '" style="color:' + color + '"></i>' +
    '<span class="hc-stat-val">' + value + '</span>' +
    '<span class="hc-stat-label">' + label + '</span>' +
    '</div>';
}

function _ragMeta_(rag) {
  var map = {
    red  : { icon: 'fa-circle-exclamation',   label: 'Critical', color: '#ef4444', bg: '#fef2f2' },
    amber: { icon: 'fa-triangle-exclamation', label: 'At Risk',  color: '#f59e0b', bg: '#fffbeb' },
    green: { icon: 'fa-circle-check',         label: 'On Track', color: '#10b981', bg: '#ecfdf5' },
    hold : { icon: 'fa-pause-circle',         label: 'On Hold',  color: '#6b7280', bg: '#f3f4f6' },
  };
  return map[rag] || map.green;
}

function _deadlineChip_(days) {
  if (days === null || days === undefined) return '';
  if (days < 0)  return '<span class="health-deadline-chip" style="color:#ef4444;background:#fef2f2"><i class="fas fa-circle-exclamation"></i> ' + Math.abs(days) + 'd overdue</span>';
  if (days === 0) return '<span class="health-deadline-chip" style="color:#f59e0b;background:#fffbeb"><i class="fas fa-clock"></i> Due today</span>';
  if (days <= 7)  return '<span class="health-deadline-chip" style="color:#f59e0b;background:#fffbeb"><i class="fas fa-clock"></i> ' + days + 'd left</span>';
  return '<span class="health-deadline-chip" style="color:#6b7280;background:#f3f4f6"><i class="fas fa-calendar-days"></i> ' + days + 'd left</span>';
}

function _healthSkeleton_() {
  var out = '';
  for (var i = 0; i < 5; i++) {
    out += '<div class="health-kpi skeleton-card" style="height:60px;min-width:120px;flex:1 1 120px"></div>';
  }
  return out;
}
</script>
