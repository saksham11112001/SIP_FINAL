<script>
// ═══════════════════════════════════════════════════════════════════════════
//  JS_Projects.html  |  Projects & Tasks page + Completed Projects page
//
//  CHANGES THIS SESSION:
//    PART 1 – Admin replaces Manager (backward-compat)
//    PART 2 – Progressive background task loading (no 'Load More' button)
//             First 50 tasks display immediately; remaining pages fetched in
//             background with setTimeout between each batch to avoid jank.
// ═══════════════════════════════════════════════════════════════════════════

// Progressive loading state
var _taskOffset       = 0;
var _taskLimit        = 50;
var _taskTotal        = 0;
var _taskHasMore      = false;
var _bgLoadInProgress = false;  // prevents concurrent background fetches
var _bgLoadGen        = 0;      // generation counter — incremented on every loadProjectsPage()
                                // so any in-flight background batches from a previous load
                                // know they are stale and must not append to allTasks

// PERT share state — temporarily disabled
// var _pertProjectId_   = null;

// ─── TASK VIEW FILTER (All Tasks / My Tasks) ─────────────────────────────────

var _taskViewFilter = 'my';  // 'all' | 'my'

function setTaskViewFilter(mode) {
  _taskViewFilter = mode;
  var btnAll = document.getElementById('btnAllTasks');
  var btnMy  = document.getElementById('btnMyTasks');
  if (btnAll) { btnAll.classList.toggle('active', mode === 'all'); btnAll.setAttribute('aria-selected', String(mode === 'all')); }
  if (btnMy)  { btnMy.classList.toggle('active',  mode === 'my');  btnMy.setAttribute('aria-selected',  String(mode === 'my')); }
  filterProjects();
}

// ─── ROLE HELPERS ─────────────────────────────────────────────────────────────

function isManagerOrLeader() {
  return currentUser.role === 'Admin' || currentUser.role === 'Team Leader';
}

function isAdmin() {
  return currentUser.role === 'Admin';
}

// ─── LOAD ────────────────────────────────────────────────────────────────────

// ─── OPTIMISTIC LOCAL TASK UPDATES ───────────────────────────────────────────
// Patch allTasks in-place and re-render immediately after task mutations so the
// UI reflects changes instantly without skeleton-flash from a full page reload.
// A quiet background sync runs after 3s to reconcile server state.

function quickCompleteTask(taskId, taskName) {
  showLoading('Marking complete…');
  runServer('updateTaskStatus', [taskId, 'Completed', '']).then(function(r) {
    hideLoading();
    if (r && r.success) {
      toast('"' + taskName + '" marked as completed', 'success');
      _patchTask_(taskId, { status: 'Completed', approvalStatus: 'Pending TL' });
      _scheduleQuietRefresh_();
    } else {
      toast('Error: ' + (r && r.error || 'Unknown'), 'error');
    }
  }).catch(function(e) { hideLoading(); toast('Error: ' + (e && e.message), 'error'); });
}

function _patchTask_(taskId, changes) {
  for (var i = 0; i < allTasks.length; i++) {
    if (allTasks[i].id === taskId) {
      var keys = Object.keys(changes);
      for (var k = 0; k < keys.length; k++) allTasks[i][keys[k]] = changes[keys[k]];
      break;
    }
  }
  renderProjectsByClient(allProjects, allTasks);
}

function _addTaskLocally_(taskId, projId, data) {
  allTasks.push({
    id: taskId, projectId: projId,
    name: data.name || '', assignedTo: data.assignedTo || '',
    dueDate: data.dueDate || '', status: data.status || 'In Progress',
    priority: data.priority || 'Medium', notes: data.notes || '',
    frequency: data.frequency || 'One Time', dayOfWeek: data.dayOfWeek || '',
    taskApprover: data.taskApprover || '',
    approvalStatus: data.status === 'Completed' ? 'Pending TL' : '',
    approvalRemarks: '', approvedBy: '', approvedDate: '', completedDate: '',
  });
  renderProjectsByClient(allProjects, allTasks);
}

function _removeTaskLocally_(taskId) {
  allTasks = allTasks.filter(function(t) { return t.id !== taskId; });
  renderProjectsByClient(allProjects, allTasks);
}

function _scheduleQuietRefresh_() {
  // Silently re-fetch tasks 3s after a mutation to reconcile server state.
  // No skeleton loaders — the UI already shows the optimistic update.
  setTimeout(function() {
    runServer('getTasks').then(function(tasks) {
      if (tasks && tasks.length) {
        allTasks = tasks;
        renderProjectsByClient(allProjects, allTasks);
      }
    }).catch(function() {}); // silent — UI already shows correct data
  }, 3000);
}

// ─────────────────────────────────────────────────────────────────────────────

function loadProjectsPage() {
  var container = document.getElementById('projectsByClient');
  if (container) container.innerHTML = skeletonCards(3);

  // Increment generation — any background batches still running from a previous
  // loadProjectsPage call will see their gen !== _bgLoadGen and abort cleanly.
  _bgLoadGen++;
  var _thisGen = _bgLoadGen;

  // Reset progressive loading state
  _taskOffset       = 0;
  _taskHasMore      = false;
  _bgLoadInProgress = false;

  Promise.all([
    runServer('getProjects'),
    runServer('getTasks'),          // load all tasks at once — avoids empty-project flash
    runServer('getClients'),
    runServer('getTeams')
  ]).then(function(results) {
    allProjects  = results[0] || [];
    allTasks     = results[1] || [];
    _taskTotal   = allTasks.length;
    _taskHasMore = false;
    _taskOffset  = allTasks.length;

    allClients = results[2] || [];
    allTeams   = results[3] || [];

    renderProjectsByClient(allProjects, allTasks);

    var wrap = document.getElementById('loadMoreWrap');
    if (wrap) wrap.innerHTML = '';

  }).catch(function(e) {
    if (container) container.innerHTML = emptyState('fa-circle-exclamation',
      'Error loading projects', (e && e.message) || 'Please refresh the page');
    toast('Error loading projects', 'error');
  });
}

// ─── PROGRESSIVE BACKGROUND LOADING ──────────────────────────────────────────
//
//  Fetches remaining task pages in the background after the initial render.
//  Each batch is fetched only after the previous one has rendered, using
//  a small setTimeout gap to keep the UI thread free between iterations.
//  No button is shown — loading is entirely invisible to the user.

function _bgLoadNextTaskBatch_(gen) {
  // Guard 1: stale generation — a newer loadProjectsPage() has started; abort.
  if (gen !== _bgLoadGen) return;
  // Guard 2: only one background fetch at a time; stop if no more data.
  if (_bgLoadInProgress || !_taskHasMore) return;
  _bgLoadInProgress = true;

  runServer('getTasksPage', [_taskOffset, _taskLimit]).then(function(pageData) {
    // Guard: check generation again after the async server call returns.
    // If loadProjectsPage() was called while we were waiting, discard this batch.
    if (gen !== _bgLoadGen) {
      _bgLoadInProgress = false;
      return;
    }

    _bgLoadInProgress = false;
    if (!pageData || !pageData.tasks || pageData.tasks.length === 0) {
      _taskHasMore = false;
      return;
    }
    _taskHasMore  = pageData.hasMore;
    _taskOffset  += pageData.tasks.length;
    _taskTotal    = pageData.total || _taskTotal;
    allTasks      = allTasks.concat(pageData.tasks);

    // Re-render to include newly loaded tasks. Wrapped in setTimeout to
    // yield to the browser between data fetch and render, preventing jank.
    setTimeout(function() {
      if (gen !== _bgLoadGen) return; // stale — skip render too
      renderProjectsByClient(allProjects, allTasks);

      // Schedule next batch if more remain
      if (_taskHasMore) {
        setTimeout(function() { _bgLoadNextTaskBatch_(gen); }, 200);
      }
    }, 0);

  }).catch(function() {
    // Background fetch failed — silently stop. User already has initial batch.
    _bgLoadInProgress = false;
    _taskHasMore      = false;
  });
}

// Kept for backward-compat (called from nowhere now but safe to leave)
function updateLoadMoreButton() {
  var wrap = document.getElementById('loadMoreWrap');
  if (wrap) wrap.innerHTML = '';
}

// ─── RENDER: PROJECTS BY CLIENT ───────────────────────────────────────────────

function renderProjectsByClient(projects, tasks) {
  var container = document.getElementById('projectsByClient');
  if (!container) return;

  var isAdmin      = currentUser.role === 'Admin';
  var isTeamLeader = currentUser.role === 'Team Leader';
  document.getElementById('btnAddProject').style.display = (isAdmin || isTeamLeader) ? '' : 'none';

  if (!projects || projects.length === 0) {
    container.innerHTML = emptyState('fa-folder-open','No projects found','Add a project to get started');
    return;
  }

  // Apply My Tasks filter: show only tasks assigned to current user
  var filteredTasks = tasks;
  if (_taskViewFilter === 'my') {
    var myName  = (currentUser.name  || '').toLowerCase();
    var myEmail = (currentUser.email || '').toLowerCase();
    filteredTasks = tasks.filter(function(t) {
      // Condition 1: task is assigned to me
      var a = (t.assignedTo || '').toLowerCase();
      var isAssigned = (a === myName || a === myEmail);
      // Condition 2: I am the designated approver and the task is waiting for my review
      var approver = (t.taskApprover || '').trim().toLowerCase();
      var isPendingMyApproval = approver &&
        t.approvalStatus === 'Pending TL' &&
        (approver === myName || approver === myEmail);
      return isAssigned || isPendingMyApproval;
    });
    // Also restrict to projects that have at least one of my tasks
    var myProjectIds = {};
    filteredTasks.forEach(function(t) { myProjectIds[t.projectId] = true; });
    projects = projects.filter(function(p) { return myProjectIds[p.id]; });
    if (projects.length === 0) {
      container.innerHTML = emptyState('fa-user-check','No tasks assigned to you or pending your review','Switch to "All Tasks" to see all projects');
      return;
    }
  }

  var byClient = {};
  var order    = [];
  for (var i = 0; i < projects.length; i++) {
    var c = projects[i].client || 'No Client';
    if (!byClient[c]) { byClient[c] = []; order.push(c); }
    byClient[c].push(projects[i]);
  }

  var html = [];
  for (var ci = 0; ci < order.length; ci++) {
    html.push(renderClientGroup(order[ci], byClient[order[ci]], filteredTasks, isAdmin));
  }
  container.innerHTML = html.join('');
}

function renderClientGroup(client, projects, tasks, isAdmin) {
  var totalTasks = 0;
  for (var i = 0; i < projects.length; i++) {
    var pid = projects[i].id;
    for (var j = 0; j < tasks.length; j++) {
      if (tasks[j].projectId === pid) totalTasks++;
    }
  }

  var parts = [
    '<div class="client-group">',
    '<div class="client-group-header" onclick="toggleClientGroup(this)">',
    '<div class="client-header-left">',
    '<i class="fas fa-chevron-down" style="font-size:12px;transition:transform .2s"></i>',
    '<span class="client-header-title"><i class="fas fa-briefcase" style="font-size:13px;opacity:.7;margin-right:4px"></i>' + escape(client) + '</span>',
    '<span class="client-count-pill">' + projects.length + ' project' + (projects.length>1?'s':'') + '</span>',
    '<span class="client-count-pill" style="background:rgba(255,255,255,.1)">' + totalTasks + ' task' + (totalTasks!==1?'s':'') + '</span>',
    '</div><i class="fas fa-ellipsis-vertical" style="opacity:.5"></i>',
    '</div>',
    '<div class="client-group-body">'
  ];

  for (var i = 0; i < projects.length; i++) {
    parts.push(renderProjectGroup(projects[i], tasks, isAdmin));
  }

  parts.push('</div></div>');
  return parts.join('');
}

// Helper: is the current user the project lead for a given projectId?
function _isProjectLead(projectId) {
  var myEmail = (currentUser.email || '').trim().toLowerCase();
  if (!myEmail) return false;
  for (var i = 0; i < allProjects.length; i++) {
    if (allProjects[i].id === projectId) {
      return (allProjects[i].teamLead || '').trim().toLowerCase() === myEmail;
    }
  }
  return false;
}

// Helper: is the current user the Second Person (first in teamMembers) for a project?
function _isProjectSecondPerson(projectId) {
  var myName  = (currentUser.name  || '').trim().toLowerCase();
  var myEmail = (currentUser.email || '').trim().toLowerCase();
  if (!myName && !myEmail) return false;
  for (var i = 0; i < allProjects.length; i++) {
    if (allProjects[i].id !== projectId) continue;
    var members = (allProjects[i].teamMembers || '').split(',');
    if (!members.length) return false;
    var first = members[0].trim().toLowerCase();
    return first.length > 0 && (first === myName || first === myEmail);
  }
  return false;
}

// Helper: is the current user ANY member of the project (teamLead or teamMembers)?
function _isProjectMember(projectId) {
  var myName  = (currentUser.name  || '').trim().toLowerCase();
  var myEmail = (currentUser.email || '').trim().toLowerCase();
  if (!myName && !myEmail) return false;
  for (var i = 0; i < allProjects.length; i++) {
    if (allProjects[i].id !== projectId) continue;
    var p = allProjects[i];
    if (myEmail && (p.teamLead || '').trim().toLowerCase() === myEmail) return true;
    var members = (p.teamMembers || '').split(',');
    for (var j = 0; j < members.length; j++) {
      var m = members[j].trim().toLowerCase();
      if (m && (m === myName || m === myEmail)) return true;
    }
  }
  return false;
}

// Helper: look up a team member's display name from their email
function _teamLeadDisplayName(email) {
  if (!email) return '';
  var emailLower = email.trim().toLowerCase();
  for (var i = 0; i < allTeams.length; i++) {
    if ((allTeams[i].email || '').trim().toLowerCase() === emailLower) {
      return allTeams[i].name;
    }
  }
  return email;
}

function renderProjectGroup(p, tasks, isAdmin) {
  var isProjLead = _isProjectLead(p.id);
  var pTasks  = [];
  var done    = 0;
  var pending = 0;
  for (var i = 0; i < tasks.length; i++) {
    if (tasks[i].projectId !== p.id) continue;
    pTasks.push(tasks[i]);
    if (tasks[i].status === 'Completed' && tasks[i].approvalStatus === 'Approved') done++;
    if (tasks[i].approvalStatus === 'Pending TL') pending++;
  }

  // Sort: High → Medium → Low; Ongoing tasks always at the bottom
  var _PRIO = { 'High': 0, 'Medium': 1, 'Low': 2 };
  pTasks.sort(function(a, b) {
    var aOng = (a.frequency || '') === 'Ongoing';
    var bOng = (b.frequency || '') === 'Ongoing';
    if (aOng !== bOng) return aOng ? 1 : -1;          // Ongoing sinks to bottom
    var pa = _PRIO[a.priority] !== undefined ? _PRIO[a.priority] : 1;
    var pb = _PRIO[b.priority] !== undefined ? _PRIO[b.priority] : 1;
    return pa - pb;
  });
  var total   = pTasks.length;
  var pct     = total > 0 ? Math.round((done/total)*100) : 0;
  var progCls = pct >= 80 ? 'prog-green' : pct >= 40 ? 'prog-amber' : 'prog-red';
  var overdue = p.deadline && daysFromToday(p.deadline) < 0 && p.status !== 'Completed';
  var onHold  = p.status === 'On Hold';

  var pid         = escape(p.id);
  var canHold     = isAdmin || isProjLead;  // Admin or this project's lead

  var parts = [
    '<div class="proj-group' + (onHold ? ' proj-on-hold' : '') + '" id="proj-' + pid + '">',

    // Header
    '<div class="proj-group-header" onclick="toggleProjGroup(this)">',
    '<div class="proj-header-left">',
    '<i class="fas fa-chevron-right" style="font-size:11px;color:var(--text-4);transition:transform .2s;flex-shrink:0"></i>',
    '<span class="proj-header-title">' + escape(p.name) + '</span>',
    '<span class="task-pill">' + total + ' task' + (total!==1?'s':'') + '</span>',
    pending > 0 ? '<span class="ab ab-pending"><i class="fas fa-hourglass-half"></i>' + pending + ' review' + (pending>1?'s':'') + '</span>' : '',
    onHold      ? '<span class="badge badge-on-hold" style="font-size:10px"><i class="fas fa-pause-circle"></i> On Hold</span>' : '',
    overdue && !onHold ? '<span class="badge badge-overdue" style="font-size:10px"><i class="fas fa-triangle-exclamation"></i> Overdue</span>' : '',
    '</div>',
    '<div class="proj-header-right">',
    statusBadge(p.status),
    // Hold / Restart toggle — Manager and Team Leader
    canHold ? '<button class="act-btn ' + (onHold ? 'act-btn-approve' : 'act-btn-hold') + '" onclick="toggleProjectHold(\'' + pid + '\',\'' + escape(p.name).replace(/'/g,"\\'") + '\',\'' + escape(p.status) + '\');event.stopPropagation()" title="' + (onHold ? 'Restart project' : 'Put on hold') + '"><i class="fas ' + (onHold ? 'fa-play' : 'fa-pause') + '"></i></button>' : '',
    (isAdmin || isProjLead) ? '<button class="act-btn act-btn-edit" onclick="openProjectModal(\'' + pid + '\');event.stopPropagation()" title="Edit project"><i class="fas fa-pen"></i></button>' : '',
    // PERT button temporarily disabled
    // (isAdmin || isProjLead) ? '<button class="act-btn" style="background:rgba(109,40,217,.08);color:#6d28d9;border:1px solid rgba(109,40,217,.25)" onclick="openPertModal(\'' + pid + '\');event.stopPropagation()" title="View PERT chart"><i class="fas fa-chart-gantt"></i></button>' : '',
    '',
    isAdmin ? '<button class="act-btn act-btn-delete" onclick="deleteProjectConfirm(\'' + pid + '\',\'' + escape(p.name).replace(/'/g,"\\'") + '\');event.stopPropagation()" title="Delete project"><i class="fas fa-trash"></i></button>' : '',
    '</div></div>',

    // Meta row
    '<div class="proj-meta-row">',
    '<span><i class="fas fa-user-tie"></i>' + escape(p.manager||'—') + '</span>',
    p.teamLead   ? '<span><i class="fas fa-user-check" style="color:var(--blue)"></i>' + escape(_teamLeadDisplayName(p.teamLead)) + '</span>' : '',
    p.teamMembers ? '<span><i class="fas fa-users"></i>' + escape(p.teamMembers) + '</span>' : '',
    '<span><i class="fas fa-calendar-days"></i> Deadline: <strong style="color:' + (overdue&&!onHold?'var(--red)':'var(--text-1)') + '">' + fmtDate(p.deadline) + '</strong></span>',
    p.startDate ? '<span><i class="fas fa-play-circle"></i> Started: ' + fmtDate(p.startDate) + '</span>' : '',
    '</div>',

    // Progress bar
    '<div class="proj-progress-wrap">',
    '<div class="proj-progress-top"><span>Task Completion</span><span><strong>' + done + '</strong>/' + total + ' approved (' + pct + '%)</span></div>',
    '<div class="prog-bar"><div class="prog-fill ' + progCls + '" style="width:' + pct + '%"></div></div>',
    '</div>',

    // Collapsible task list
    '<div class="collapsible" id="tasks-' + pid + '">'
  ];

  if (pTasks.length === 0) {
    parts.push('<div style="padding:14px 16px;color:var(--text-3);font-size:13px;text-align:center;font-style:italic">No tasks yet.</div>');
  } else {
    parts.push('<div class="task-list">');
    var shownOngoingDivider = false;
    for (var ti = 0; ti < pTasks.length; ti++) {
      // Insert a visual divider before the first Ongoing task
      if (!shownOngoingDivider && (pTasks[ti].frequency || '') === 'Ongoing') {
        shownOngoingDivider = true;
        parts.push(
          '<div style="display:flex;align-items:center;gap:8px;padding:6px 12px 2px;opacity:.7">' +
          '<span style="flex:1;height:1px;background:var(--border)"></span>' +
          '<span style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);white-space:nowrap">' +
          '<i class="fas fa-infinity" style="margin-right:4px"></i>Ongoing Tasks</span>' +
          '<span style="flex:1;height:1px;background:var(--border)"></span>' +
          '</div>'
        );
      }
      parts.push(renderTaskCard(pTasks[ti], isAdmin, onHold));
    }
    parts.push('</div>');
  }

  var canAddTask = isAdmin || isProjLead || _isProjectMember(p.id);
  if (canAddTask) {
    parts.push(
      '<div class="task-add-bar" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">' +
      (isAdmin || isProjLead || _isProjectSecondPerson(p.id) ?
        '<button class="btn btn-ghost btn-sm" style="color:var(--blue);border-color:var(--blue);opacity:.85" onclick="openTemplateModal(\'' + pid + '\')">' +
          '<i class="fas fa-wand-magic-sparkles"></i> Task Templates' +
        '</button>' : '') +
      '<button class="btn btn-outline btn-sm" onclick="openTaskModal(null,\'' + pid + '\')"><i class="fas fa-plus"></i> Add Task</button>' +
      '</div>'
    );
  }

  parts.push('</div></div>');
  return parts.join('');
}

function renderTaskCard(t, isAdmin, projectOnHold) {
  var isOngoing = (t.frequency || '') === 'Ongoing';
  var ov      = !isOngoing && isOverdue(t.dueDate, t.status);  // Ongoing tasks never show overdue
  var priCls  = (t.priority||'medium').toLowerCase();
  var myTask        = currentUser.name === t.assignedTo || currentUser.email === t.assignedTo;
  var isLead        = _isProjectLead(t.projectId);
  var isSecondPerson = _isProjectSecondPerson(t.projectId);
  // Full edit: Admin, project lead, or second person (first in teamMembers).
  // Status-only edit: the assigned member (myTask).
  var canEdit = isAdmin || isLead || isSecondPerson || myTask;
  var tid     = escape(t.id);

  // Determine who is the effective approver for this task
  var hasDesignatedApprover = !!(t.taskApprover && t.taskApprover.trim());
  var isDesignatedApprover  = hasDesignatedApprover && (
    (currentUser.name  || '').trim().toLowerCase() === t.taskApprover.trim().toLowerCase() ||
    (currentUser.email || '').trim().toLowerCase() === t.taskApprover.trim().toLowerCase()
  );
  // Gavel button: if task has a designated approver → show to that person + Admin
  //               if no designated approver → show to project lead + Admin
  var canApproveTL = t.approvalStatus === 'Pending TL' &&
    (isAdmin || (hasDesignatedApprover ? isDesignatedApprover : isLead));

  var apprLabel = t.approvalStatus;
  if (apprLabel === 'Pending TL') apprLabel = 'Pending Review';

  var parts = [
    '<div class="task-card ' + priCls + '">',
    '<div class="task-card-main">',
    '<div class="task-card-name' + (ov?' overdue-name':'') + '">',
    '<span class="priority-dot ' + priCls + '"></span>',
    escape(t.name),
    isOngoing ? ' <span class="badge badge-ongoing" style="font-size:10px"><i class="fas fa-infinity"></i> Ongoing</span>' : '',
    t.approvalStatus ? ' ' + approvalBadge(apprLabel) : '',
    ov ? ' <span class="badge badge-overdue" style="font-size:10px"><i class="fas fa-triangle-exclamation"></i> Overdue</span>' : '',
    '</div>',
    '<div class="task-meta">',
    '<span><i class="fas fa-user"></i>' + escape(t.assignedTo||'Unassigned') + '</span>',
    // Show designated approver chip only when it's set (and different info from lead)
    hasDesignatedApprover
      ? '<span title="Approver: ' + escape(t.taskApprover) + '"><i class="fas fa-stamp" style="color:var(--purple)"></i> ' + escape(t.taskApprover) + '</span>'
      : '',
    (!isOngoing && t.dueDate) ? '<span>' + dueDaysLabel(t.dueDate, t.status) + '</span>' : '',
    '<span>' + statusBadge(t.status) + '</span>',
    '<span>' + priorityBadge(t.priority) + '</span>',
    t.notes ? '<span title="' + escape(t.notes) + '"><i class="fas fa-note-sticky" style="color:var(--amber)"></i></span>' : '',
    '</div>'
  ];

  if (t.approvalStatus === 'Rejected' && t.approvalRemarks) {
    parts.push('<div style="margin-top:6px;font-size:11px;color:var(--red);background:#fef2f2;padding:5px 9px;border-radius:var(--r-sm);border-left:3px solid var(--red)"><i class="fas fa-xmark"></i> <strong>Rejected:</strong> ' + escape(t.approvalRemarks) + '</div>');
  }

  parts.push('</div><div class="task-card-actions">');

  if (canEdit) {
    // Mark Complete quick-action — only for In Progress tasks
    if (t.status === 'In Progress') {
      parts.push('<button class="act-btn act-btn-complete" onclick="quickCompleteTask(\'' + tid + '\',\'' + escape(t.name).replace(/'/g,"\\'") + '\')" title="Mark as completed"><i class="fas fa-circle-check"></i></button>');
    }
    parts.push('<button class="act-btn act-btn-edit" onclick="openTaskModal(\'' + tid + '\')" title="Edit task"><i class="fas fa-pen"></i></button>');
    // Reassign button — visible to Admin, project lead, or current assignee
    parts.push('<button class="act-btn act-btn-reassign" onclick="openReassignModal(\'' + tid + '\')" title="Reassign task"><i class="fas fa-user-pen"></i></button>');
  }

  // Approve / reject button — not shown for On Hold projects
  if (!projectOnHold && canApproveTL) {
    var approveTitle = hasDesignatedApprover ? 'Review as designated approver' : 'Lead Review';
    parts.push('<button class="act-btn act-btn-approve" onclick="openApprovalModal(\'' + tid + '\')" title="' + approveTitle + '"><i class="fas fa-gavel"></i></button>');
  }

  if (isAdmin || isLead || isSecondPerson) {
    parts.push('<button class="act-btn act-btn-delete" onclick="deleteTaskConfirm(\'' + tid + '\',\'' + escape(t.name).replace(/'/g,"\\'") + '\')" title="Delete task"><i class="fas fa-trash"></i></button>');
  }

  parts.push('</div></div>');
  return parts.join('');
}

// ─── HOLD / RESTART ──────────────────────────────────────────────────────────

function toggleProjectHold(projectId, projectName, currentStatus) {
  var isOnHold = currentStatus === 'On Hold';
  var msg = isOnHold
    ? 'Restart project "' + projectName + '"? It will be set back to Active.'
    : 'Put project "' + projectName + '" on hold? Email reminders will be paused for its tasks.';
  var label = isOnHold ? 'Restart' : 'Hold';

  // Reuse confirmDelete modal with custom message, swapping button label
  var confirmText = document.getElementById('confirmText');
  var confirmBtn  = document.getElementById('confirmBtn');
  if (confirmText) confirmText.textContent = msg;
  if (confirmBtn) {
    confirmBtn.innerHTML = '<i class="fas fa-' + (isOnHold ? 'play' : 'pause') + '"></i> ' + label;
    confirmBtn.className = 'btn ' + (isOnHold ? 'btn-primary' : 'btn-warning');
    confirmBtn.onclick = function() {
      closeModal('confirmModal');
      // Restore delete styling for next use
      if (confirmBtn) { confirmBtn.className = 'btn btn-danger'; confirmBtn.innerHTML = '<i class="fas fa-trash-can"></i> Delete'; }
      showLoading(isOnHold ? 'Restarting project…' : 'Putting project on hold…');
      runServer('toggleProjectHold', [projectId]).then(function(r) {
        hideLoading();
        if (r && r.success) {
          toast(r.newStatus === 'On Hold' ? 'Project put on hold' : 'Project restarted', 'success');
          _pageLoaded['projects'] = false;
          loadProjectsPage();
        } else {
          toast('Error: ' + (r && r.error || 'Unknown'), 'error');
        }
      }).catch(function(e) { hideLoading(); toast('Error: ' + (e && e.message), 'error'); });
    };
  }
  openModal('confirmModal');
}

// ─── FILTER ──────────────────────────────────────────────────────────────────

function filterProjects() {
  var q      = (document.getElementById('projSearch').value||'').toLowerCase();
  var status = document.getElementById('projStatusFilter').value;
  var ctype  = document.getElementById('projClientTypeFilter').value;

  // ── When a query is active, also search tasks and clients ─────────────────
  // Any project whose task(s) match is included, and only the matching tasks
  // are shown inside that project (so the user sees exactly what matched).
  var searchTasks = allTasks;   // tasks passed to renderer (all or filtered)

  if (q) {
    // Build set of project IDs that have at least one matching task
    var taskMatchProjectIds = {};
    var matchingTasks = allTasks.filter(function(t) {
      var hit = [t.name, t.assignedTo, t.notes, t.status, t.priority, t.approvalStatus]
        .some(function(f){ return (f||'').toLowerCase().indexOf(q) !== -1; });
      if (hit) taskMatchProjectIds[t.projectId] = true;
      return hit;
    });

    // Build set of project IDs where client info matches
    var clientMatchProjectIds = {};
    allClients.forEach(function(c) {
      var hit = [c.name, c.type, c.contactPerson, c.contactEmail, c.phone]
        .some(function(f){ return (f||'').toLowerCase().indexOf(q) !== -1; });
      if (hit) {
        // Find all projects for this client
        allProjects.forEach(function(p) {
          if ((p.client||'').toLowerCase() === (c.name||'').toLowerCase()) {
            clientMatchProjectIds[p.id] = true;
          }
        });
      }
    });

    var filtered = allProjects.filter(function(p) {
      if (!status && p.status === 'Completed') return false;
      var matchS  = !status || p.status === status;
      var matchCT = !ctype  || p.clientType === ctype;
      if (!matchS || !matchCT) return false;

      // Project-level fields: name, client, manager, teamMembers, teamLead, status
      var matchProjFields = [p.name, p.client, p.manager, p.teamMembers, p.teamLead, p.status]
        .some(function(f){ return (f||'').toLowerCase().indexOf(q) !== -1; });

      return matchProjFields || taskMatchProjectIds[p.id] || clientMatchProjectIds[p.id];
    });

    // When searching, show only matching tasks inside matched projects
    // (projects matched by project fields still show all their tasks)
    var projMatchedByField = {};
    filtered.forEach(function(p) {
      var matchProjFields = [p.name, p.client, p.manager, p.teamMembers, p.teamLead, p.status]
        .some(function(f){ return (f||'').toLowerCase().indexOf(q) !== -1; });
      if (matchProjFields || clientMatchProjectIds[p.id]) projMatchedByField[p.id] = true;
    });

    searchTasks = allTasks.filter(function(t) {
      // If the parent project matched by its own fields, show all its tasks
      if (projMatchedByField[t.projectId]) return true;
      // Otherwise only show the task if it personally matched
      return !!taskMatchProjectIds[t.projectId] &&
        [t.name, t.assignedTo, t.notes, t.status, t.priority, t.approvalStatus]
          .some(function(f){ return (f||'').toLowerCase().indexOf(q) !== -1; });
    });

    renderProjectsByClient(filtered, searchTasks);

  } else {
    // No search query — standard status/type filter only
    var filtered2 = allProjects.filter(function(p) {
      if (!status && p.status === 'Completed') return false;
      var matchS  = !status || p.status === status;
      var matchCT = !ctype  || p.clientType === ctype;
      return matchS && matchCT;
    });
    renderProjectsByClient(filtered2, allTasks);
  }
}

function clearProjectFilters() {
  document.getElementById('projSearch').value           = '';
  document.getElementById('projStatusFilter').value     = '';
  document.getElementById('projClientTypeFilter').value = '';
  filterProjects();
}

// Returns today + 7 days formatted as yyyy-MM-dd for <input type="date">
function _defaultDueDate() {
  var d = new Date();
  d.setDate(d.getDate() + 7);
  var mm = ('0' + (d.getMonth()+1)).slice(-2);
  var dd = ('0' + d.getDate()).slice(-2);
  return d.getFullYear() + '-' + mm + '-' + dd;
}

function buildTeamOptions() {
  var opts = '<option value="">Unassigned</option>';
  for (var i = 0; i < allTeams.length; i++) {
    opts += '<option value="' + escape(allTeams[i].name) + '">' + escape(allTeams[i].name) + '</option>';
  }
  return opts;
}

function removeInitialTaskRow(rowId) {
  var el = document.getElementById(rowId);
  if (el) el.parentNode.removeChild(el);
}

function clearInitialTasks() {
  var list = document.getElementById('initialTasksList');
  if (list) list.innerHTML = '';
  _initTaskCounter = 0;
}

function getInitialTasks() {
  var rows  = document.querySelectorAll('#initialTasksList > div');
  var tasks = [];
  for (var i = 0; i < rows.length; i++) {
    var name = rows[i].querySelector('.it-name').value.trim();
    if (!name) continue;
    tasks.push({
      name      : name,
      assignedTo: rows[i].querySelector('.it-assignee').value,
      dueDate   : rows[i].querySelector('.it-due').value,
      priority  : 'Medium',
      notes     : rows[i].getAttribute('data-notes') || ''
    });
  }
  return tasks;
}

function openTemplateModal(projectId) {
  document.getElementById('tpProjectId').value = projectId;
  _tpCurrentCategory = 'kickoff';
  _renderTpCategories();
  _renderTpTasks();
  openModal('templatePickerModal');
}

function _renderTpCategories() {
  var wrap = document.getElementById('tpCategoryBtns');
  if (!wrap) return;
  var html = '';
  Object.keys(TP_CATEGORY_META).forEach(function(key) {
    var m       = TP_CATEGORY_META[key];
    var active  = key === _tpCurrentCategory;
    var bg      = active ? m.color : m.bg;
    var color   = active ? '#fff'  : m.color;
    var border  = active ? m.color : m.border;
    var weight  = active ? '700'   : '600';
    html +=
      '<button type="button" onclick="tpSwitchCategory(\'' + key + '\')" ' +
      'style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;' +
      'border:1.5px solid ' + border + ';background:' + bg + ';color:' + color + ';' +
      'border-radius:99px;font-size:12px;font-weight:' + weight + ';cursor:pointer;transition:all .15s">' +
      '<i class="fas ' + m.icon + '" style="font-size:11px"></i> ' + m.label +
      '</button>';
  });
  wrap.innerHTML = html;
}

function tpSwitchCategory(key) {
  _tpCurrentCategory = key;
  _renderTpCategories();
  _renderTpTasks();
}

function _renderTpTasks() {
  var list  = document.getElementById('tpTaskList');
  if (!list) return;
  var tasks = TASK_TEMPLATES[_tpCurrentCategory] || [];
  var m     = TP_CATEGORY_META[_tpCurrentCategory];
  var defaultDue = _defaultDueDate();

  var html = '<div style="border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">';

  for (var i = 0; i < tasks.length; i++) {

    html += '<div style="display:grid;grid-template-columns:32px 1fr 140px 130px;gap:0;align-items:center;' +
            'padding:10px 12px;background:' + bg + ';border-bottom:1px solid var(--border)">';

    html += '<div><input type="checkbox" id="' + idx + '" class="tp-check" data-cat="' + _tpCurrentCategory + '" data-idx="' + i + '" ' +
            'onchange="_tpUpdateCount()" style="width:15px;height:15px;cursor:pointer;accent-color:' + m.color + '"></div>';

    html += '<div style="padding-right:12px">' +
            '<div style="font-size:13px;font-weight:600;color:var(--text-1)">' + escape(t.name) + '</div>' +
            (t.notes ? '<div style="font-size:11px;color:var(--text-3);margin-top:2px;line-height:1.4">' + escape(t.notes) + '</div>' : '') +
            '</div>';

    html += '<div style="padding-right:8px"><select id="' + idx + '_assignee" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;background:var(--surface)">' +

function _tpToggleAll(checked) {
  document.querySelectorAll('#tpTaskList .tp-check').forEach(function(cb) { cb.checked = checked; });
  _tpUpdateCount();
}

function _tpUpdateCount() {
  var count = document.querySelectorAll('#tpTaskList .tp-check:checked').length;
  var el    = document.getElementById('tpSelCount');
  if (el) el.textContent = count + ' task' + (count !== 1 ? 's' : '') + ' selected';
}

function submitTemplateSelection() {
  var projectId = document.getElementById('tpProjectId').value;
  var checked   = document.querySelectorAll('#tpTaskList .tp-check:checked');

  if (checked.length === 0) {
    toast('Please select at least one task.', 'warning');
    return;
  }

  var taskList = [];
  checked.forEach(function(cb) {
    var cat  = cb.getAttribute('data-cat');
    var idx  = parseInt(cb.getAttribute('data-idx'), 10);
    var t    = TASK_TEMPLATES[cat][idx];
    var id   = 'tp_' + cat + '_' + idx;
    taskList.push({
      name      : t.name,
      assignedTo: document.getElementById(id + '_assignee').value || '',
      dueDate   : document.getElementById(id + '_due').value       || '',
      priority  : 'Medium',
      notes     : t.notes || ''
    });
  });

  closeModal('templatePickerModal');
  showLoading('Adding ' + taskList.length + ' task' + (taskList.length !== 1 ? 's' : '') + '…');

  runServer('addTasksBulk', [projectId, taskList]).then(function(r) {
    hideLoading();
    if (r && r.success) {
      toast(taskList.length + ' task' + (taskList.length !== 1 ? 's' : '') + ' added successfully', 'success');
      _pageLoaded['projects'] = false;
      loadProjectsPage();
    } else {
      toast('Error: ' + (r && r.error || 'Unknown'), 'error');
    }
  }).catch(function(e) { hideLoading(); toast('Error: ' + (e && e.message), 'error'); });
}

function _pertWeeks_(startStr, endStr) {
  // _parseDate_() is defined in JS_Utils.html (loaded first) and handles
  // locale date strings like "01/04/2026" (DD/MM/YYYY India) correctly.
  var start = _parseDate_(startStr) || new Date();
  var end   = _parseDate_(endStr)   || new Date(start.getTime() + 90 * 86400000);
  // Snap start to Monday of that week
  var day = start.getDay(); // 0=Sun
  start.setDate(start.getDate() - (day === 0 ? 6 : day - 1));
  start.setHours(0, 0, 0, 0);
  end.setHours(23, 59, 59, 999);
  var weeks = [];
  var cur = new Date(start);
  var safetyMax = 200; // never loop forever
  while (cur <= end && weeks.length < safetyMax) {
    weeks.push(new Date(cur));
    cur.setDate(cur.getDate() + 7);
  }
  // Always show at least 8 weeks
  while (weeks.length < 8) {
    var last = weeks.length > 0 ? weeks[weeks.length - 1] : new Date();
    var next = new Date(last.getTime() + 7 * 86400000);
    weeks.push(next);
  }
  return weeks;
}

function _pertTaskWeekIdx_(dateStr, weeks) {
  if (!dateStr) return -1;
  var d = _parseDate_(dateStr);
  if (!d) return -1;
  d.setHours(12, 0, 0, 0);
  for (var i = 0; i < weeks.length; i++) {
    var ws = new Date(weeks[i]); ws.setHours(0, 0, 0, 0);
    var we = new Date(ws.getTime() + 6 * 86400000); we.setHours(23, 59, 59, 999);
    if (d >= ws && d <= we) return i;
  }
  return -1;
}

function openProjectModal(projectId) {
  // Always fetch clients and teams fresh from the server before opening.
  // This guarantees the dropdowns are never blank, regardless of whether
  // loadProjectsPage() has run, what the cache contains, or which sheet
  // SPREADSHEET_ID currently points to.
  showLoading('Opening project form…');
  Promise.all([
    runServer('getClients'),
    runServer('getTeams')
  ]).then(function(res) {
    allClients = res[0] || [];
    allTeams   = res[1] || [];
    hideLoading();
    _openProjectModal_(projectId);
  }).catch(function(e) {
    hideLoading();
    toast('Could not load clients/teams: ' + (e && e.message || 'Unknown error'), 'error');
  });
}

function _openProjectModal_(projectId) {
  var isEdit = !!projectId;
  document.getElementById('projectModalTitle').textContent = isEdit ? 'Edit Project' : 'New Project';
  document.getElementById('projectId').value = projectId || '';

  var tasksSection = document.getElementById('initialTasksSection');
  if (tasksSection) tasksSection.style.display = isEdit ? 'none' : '';

  clearInitialTasks();

  var clientNames = allClients.map(function(c){ return c.name; });
  var mgrNames    = allTeams.filter(function(m){ return m.role === 'Admin' || m.role === 'Team Leader'; }).map(function(m){ return m.name; });
  var tlNames     = allTeams.map(function(m){ return m.name; });
  var staffNames  = allTeams.map(function(m){ return m.name; });

  // Initialise searchable single-select for Manager and Team Lead
  initMultiSelect('ms-projManager',  mgrNames, [], { single: true, placeholder: 'Select manager…' });
  initMultiSelect('ms-projTeamLead', tlNames,  [], { single: true, placeholder: 'Select project lead…' });

  if (isEdit) {
    var p = null;
    for (var i = 0; i < allProjects.length; i++) { if (allProjects[i].id === projectId) { p = allProjects[i]; break; } }
    if (!p) return;
    document.getElementById('projName').value       = p.name       || '';
    document.getElementById('projClientType').value = p.clientType || '';
    document.getElementById('projStartDate').value  = toInputDate(p.startDate);
    document.getElementById('projDeadline').value   = toInputDate(p.deadline);
    document.getElementById('projStatus').value     = p.status     || 'Active';

    // Manager — stored as name
    if (p.manager) setMultiSelectValues('ms-projManager', [p.manager]);

    // Team Lead — stored as email, look up name for display
    var tlEmail = (p.teamLead || '').trim().toLowerCase();
    if (tlEmail) {
      for (var ti = 0; ti < allTeams.length; ti++) {
        if ((allTeams[ti].email || '').trim().toLowerCase() === tlEmail) {
          setMultiSelectValues('ms-projTeamLead', [allTeams[ti].name]);
          break;
        }
      }
    }

    var selectedClients = (p.client || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    initMultiSelect('ms-projClient', clientNames, selectedClients, { placeholder: 'Select clients…' });
    var existing = (p.teamMembers || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    initMultiSelect('ms-projTeamMembers', staffNames, existing, { placeholder: 'Select staff members…' });
  } else {
    document.getElementById('projName').value = '';
    ['projClientType','projStartDate','projDeadline'].forEach(function(fid){ document.getElementById(fid).value=''; });
    document.getElementById('projStatus').value = 'Active';
    initMultiSelect('ms-projClient', clientNames, [], { placeholder: 'Select clients…' });
    initMultiSelect('ms-projTeamMembers', staffNames, [], { placeholder: 'Select staff members…' });
  }
  openModal('projectModal');
}

function saveProject() {
  var id     = document.getElementById('projectId').value;
  var name   = document.getElementById('projName').value.trim();
  var client = getMultiSelectString('ms-projClient');

  if (!name) { toast('Project name is required.', 'warning'); return; }

  var ct    = document.getElementById('projClientType').value;
  var start = document.getElementById('projStartDate').value;
  var dl    = document.getElementById('projDeadline').value;
  var mgr   = getMultiSelectValues('ms-projManager')[0] || '';
  var team  = getMultiSelectString('ms-projTeamMembers');
  var stat  = document.getElementById('projStatus').value;

  // Team Lead is displayed by name but stored as email — look up the email
  var tlName = getMultiSelectValues('ms-projTeamLead')[0] || '';
  var tl = '';
  if (tlName) {
    for (var tli = 0; tli < allTeams.length; tli++) {
      if (allTeams[tli].name === tlName) { tl = allTeams[tli].email || ''; break; }
    }
  }

  showLoading(id ? 'Updating project…' : 'Creating project…');
  closeModal('projectModal');

  if (id) {
    runServer('updateProject', [id, name, client, start, dl, ct, mgr, team, stat, tl]).then(function(r) {
      hideLoading();
      if (r && r.success) {
        toast('Project updated', 'success');
        _pageLoaded['projects'] = false;
        loadProjectsPage();
      } else {
        toast('Error: ' + (r && r.error || 'Unknown'), 'error');
      }
    }).catch(function(e) { hideLoading(); toast('Server error: ' + (e && e.message), 'error'); });
  } else {
    var projectData = { name:name, client:client, startDate:start, deadline:dl,
                        clientType:ct, manager:mgr, teamMembers:team, teamLead:tl };
    var taskList    = getInitialTasks();

    runServer('addProjectWithTasks', [projectData, taskList]).then(function(r) {
      hideLoading();
      if (r && r.success) {
        var msg = taskList.length > 0
          ? 'Project created with ' + taskList.length + ' task' + (taskList.length > 1 ? 's' : '')
          : 'Project created';
        toast(msg, 'success');
        _pageLoaded['projects'] = false;
        loadProjectsPage();
      } else {
        toast('Error: ' + (r && r.error || 'Unknown'), 'error');
      }
    }).catch(function(e) { hideLoading(); toast('Server error: ' + (e && e.message), 'error'); });
  }
}

function deleteProjectConfirm(id, name) {
  confirmDelete('Delete project "' + name + '"? Tasks remain assigned.', function() {
    showLoading('Deleting project…');
    runServer('deleteProject', [id]).then(function(r) {
      hideLoading();
      if (r && r.success) { toast('Project deleted','success'); _pageLoaded['projects']=false; loadProjectsPage(); }
      else toast('Error: '+(r&&r.error),'error');
    }).catch(function(e){ hideLoading(); toast('Error: '+(e&&e.message),'error'); });
  });
}

// ─── TASK MODAL ──────────────────────────────────────────────────────────────

function onFrequencyChange() {
  var freq  = (document.getElementById('taskFrequency') || {}).value || 'One Time';
  var drRow = document.getElementById('dueDateRow');
  var dwRow = document.getElementById('dayOfWeekRow');
  if (drRow) drRow.style.display  = (freq === 'One Time') ? '' : 'none';
  if (dwRow) dwRow.style.display  = (freq === 'Weekly')   ? '' : 'none';
}

function openTaskModal(taskId, projId) {
  var isEdit = !!taskId;

  // ── Resolve the task object FIRST so we know the correct project for permission checks ──
  var t = null;
  if (isEdit) {
    for (var i = 0; i < allTasks.length; i++) { if (allTasks[i].id === taskId) { t = allTasks[i]; break; } }
    if (!t) return;
  }
  var effectiveProjId = (t && t.projectId) || projId || '';

  // ── Permission ────────────────────────────────────────────────────────────────
  // Full edit: Admin, Project Lead, or Second Person (first in teamMembers).
  // New task creation: extended to any project member (buddy can add tasks).
  // Status-only edit: buddies editing their own existing tasks.
  var isAdmin      = currentUser.role === 'Admin';
  var canFullEdit  = isAdmin || _isProjectLead(effectiveProjId) || _isProjectSecondPerson(effectiveProjId) ||
                     (!isEdit && _isProjectMember(effectiveProjId));

  document.getElementById('taskModalTitle').textContent = isEdit ? 'Edit Task' : 'New Task';
  document.getElementById('taskId').value        = taskId || '';
  document.getElementById('taskProjectId').value = effectiveProjId;

  document.getElementById('taskFullForm').style.display      = canFullEdit ? '' : 'none';
  document.getElementById('taskStatusOnlyForm').style.display = canFullEdit ? 'none' : '';

  var teamNames = allTeams.map(function(m){ return m.name; });
  initMultiSelect('ms-taskAssignedTo', teamNames, [], { single: true, placeholder: 'Unassigned' });

  // Populate the Task Approver dropdown (full-edit form only)
  if (canFullEdit) {
    _populateTaskApproverSelect_(effectiveProjId);
  }

  if (isEdit) {
    document.getElementById('taskProjectId').value = t.projectId;
    if (canFullEdit) {
      document.getElementById('taskName').value     = t.name     || '';
      document.getElementById('taskDueDate').value  = toInputDate(t.dueDate);
      document.getElementById('taskPriority').value = t.priority || 'Medium';
      document.getElementById('taskStatus').value   = t.status   || 'In Progress';
      document.getElementById('taskNotes').value    = t.notes    || '';
      if (t.assignedTo) setMultiSelectValues('ms-taskAssignedTo', [t.assignedTo]);
      var fqEdit = document.getElementById('taskFrequency');
      var dwEdit = document.getElementById('taskDayOfWeek');
      if (fqEdit) { fqEdit.value = t.frequency || 'One Time'; onFrequencyChange(); }
      if (dwEdit && t.dayOfWeek) dwEdit.value = t.dayOfWeek;
      // Override approver select with saved value (or empty = use project lead)
      _populateTaskApproverSelect_(t.projectId, t.taskApprover || '');
    } else {
      document.getElementById('taskNameReadonly').value = t.name   || '';
      document.getElementById('taskStatusOnly').value   = t.status || 'In Progress';
      document.getElementById('taskNotesOnly').value    = t.notes  || '';
    }
  } else {
    // New task — pre-fill due date to today + 7 days
    if (canFullEdit) {
      ['taskName','taskNotes'].forEach(function(fid){ document.getElementById(fid).value=''; });
      document.getElementById('taskDueDate').value  = _defaultDueDate();
      document.getElementById('taskPriority').value = 'Medium';
      document.getElementById('taskStatus').value   = 'In Progress';
      // New task: approver dropdown already populated above with no selection (= use project lead)
    }
    // Reset frequency for new task
    var fqEl = document.getElementById('taskFrequency');
    if (fqEl) { fqEl.value = 'One Time'; onFrequencyChange(); }
  }

  // Attachments: show only when editing existing task
  var attachSection = document.getElementById('taskAttachmentsSection');
  var attachList    = document.getElementById('taskAttachmentsList');
  if (attachSection) attachSection.style.display = isEdit ? '' : 'none';
  if (isEdit && attachList) {
    attachList.innerHTML = '<div style="font-size:12px;color:var(--text-3);padding:4px 0"><i class="fas fa-spinner fa-spin"></i> Loading attachments…</div>';
    loadTaskAttachments(taskId);
  }
  // Reset file input so same file can be uploaded again
  var fileInp = document.getElementById('taskFileInput');
  if (fileInp) fileInp.value = '';

  // Populate the attachment approver dropdown with all team members
  var attachApproverEl = document.getElementById('attachApprover');
  if (attachApproverEl) {
    var currentApprover = (t && t.taskApprover) ? t.taskApprover : '';
    var opts = '<option value="">— Reviewer: project lead —</option>';
    for (var ai = 0; ai < allTeams.length; ai++) {
      var selected = (allTeams[ai].name === currentApprover) ? ' selected' : '';
      opts += '<option value="' + escape(allTeams[ai].name) + '"' + selected + '>' + escape(allTeams[ai].name) + '</option>';
    }
    attachApproverEl.innerHTML = opts;
  }

  openModal('taskModal');
}

function saveTask() {
  var id          = document.getElementById('taskId').value;
  var projId      = document.getElementById('taskProjectId').value;
  var canFullEdit = currentUser.role === 'Admin' ||
    _isProjectLead(projId) ||
    _isProjectSecondPerson(projId) ||
    (!id && _isProjectMember(projId)); // new task: any project member can create
  var fn, args;

  if (canFullEdit) {
    var name     = document.getElementById('taskName').value.trim();
    var assigned = getMultiSelectString('ms-taskAssignedTo');
    var due      = document.getElementById('taskDueDate').value;
    var priority = document.getElementById('taskPriority').value;
    var status   = document.getElementById('taskStatus').value;
    var notes    = document.getElementById('taskNotes').value.trim();
    if (!name) { toast('Task name is required.','warning'); return; }
    var freq         = (document.getElementById('taskFrequency') || {value:'One Time'}).value || 'One Time';
    var dow          = freq === 'Weekly' ? ((document.getElementById('taskDayOfWeek') || {value:'Mon'}).value || 'Mon') : '';
    if (freq === 'Weekly' && !dow) { toast('Please select a day of the week.','warning'); return; }
    var taskApprover = getMultiSelectValues('ms-taskApprover')[0] || '';
    fn   = id ? 'updateTask' : 'addTask';
    args = id ? [id, projId, name, assigned, due, status, priority, notes, freq, dow, taskApprover]
              : [projId, name, assigned, due, status, priority, notes, freq, dow, taskApprover];
  } else {
    var status2 = document.getElementById('taskStatusOnly').value;
    var notes2  = document.getElementById('taskNotesOnly').value.trim();
    if (!id) { toast('Cannot create tasks as a staff member.','warning'); return; }
    fn   = 'updateTaskStatus';
    args = [id, status2, notes2];
  }

  showLoading(id ? 'Saving task…' : 'Creating task…');
  closeModal('taskModal');

  runServer(fn, args).then(function(r) {
    hideLoading();
    if (r && r.success) {
      toast(id ? 'Task updated' : 'Task created', 'success');
      if (fn === 'addTask') {
        _addTaskLocally_(r.taskId || r.id || ('t_' + Date.now()), projId, {
          name: name, assignedTo: assigned, dueDate: due,
          status: status, priority: priority, notes: notes,
          frequency: freq, dayOfWeek: dow, taskApprover: taskApprover
        });
      } else if (fn === 'updateTask') {
        _patchTask_(id, {
          name: name, assignedTo: assigned, dueDate: due,
          status: status, priority: priority, notes: notes,
          frequency: freq, dayOfWeek: dow, taskApprover: taskApprover
        });
      } else {
        // updateTaskStatus (staff member path)
        _patchTask_(id, { status: status2, notes: notes2 });
      }
      _scheduleQuietRefresh_();
    } else {
      toast('Error: '+(r&&r.error||'Unknown'),'error');
    }
  }).catch(function(e){ hideLoading(); toast('Error: '+(e&&e.message),'error'); });
}

function deleteTaskConfirm(id, name) {
  confirmDelete('Delete task "' + name + '"?', function() {
    showLoading('Deleting task…');
    runServer('deleteTask', [id]).then(function(r) {
      hideLoading();
      if (r && r.success) { toast('Task deleted','success'); _removeTaskLocally_(id); _scheduleQuietRefresh_(); }
      else toast('Error: '+(r&&r.error),'error');
    }).catch(function(e){ hideLoading(); toast('Error: '+(e&&e.message),'error'); });
  });
}

// ─── TASK APPROVER SELECT HELPER ─────────────────────────────────────────────
// Rebuilds the #taskApprover <select> from allTeams.
// projectId — kept for future per-project filtering; not used yet.
// currentApprover — the stored name string (empty string → "use project lead").

function _populateTaskApproverSelect_(projectId, currentApprover) {
  var names = allTeams.map(function(m){ return m.name; });
  initMultiSelect('ms-taskApprover', names,
    currentApprover ? [currentApprover] : [],
    { single: true, placeholder: '— Use project lead (default) —' });
}

// ─── APPROVAL MODAL ──────────────────────────────────────────────────────────

function openApprovalModal(taskId) {
  var t = null;
  for (var i = 0; i < allTasks.length; i++) { if (allTasks[i].id === taskId) { t = allTasks[i]; break; } }
  if (!t) return;

  document.getElementById('approvalTaskId').value  = taskId;
  document.getElementById('approvalRemarks').value = '';

  var p = null;
  for (var j = 0; j < allProjects.length; j++) { if (allProjects[j].id === t.projectId) { p = allProjects[j]; break; } }

  var stageLabel = 'Lead Review';

  document.getElementById('approvalTaskInfo').innerHTML =
    '<div style="display:flex;flex-direction:column;gap:6px">' +
    '<div style="font-size:13px;color:var(--blue);font-weight:600;margin-bottom:2px"><i class="fas fa-circle-dot"></i> ' + stageLabel + '</div>' +
    '<div style="font-size:15px;font-weight:700;color:var(--text-1)">' + escape(t.name) + '</div>' +
    '<div style="font-size:12px;color:var(--text-3)">' +
      '<i class="fas fa-folder" style="color:var(--blue)"></i> ' + escape((p&&p.name)||t.projectId) +
      '  <i class="fas fa-user" style="color:var(--blue);margin-left:8px"></i> ' + escape(t.assignedTo||'—') +
      '  <i class="fas fa-calendar" style="color:var(--blue);margin-left:8px"></i> ' + fmtDate(t.dueDate) +
    '</div>' +
    (t.notes ? '<div style="font-size:12px;background:var(--surface-2);padding:7px 10px;border-radius:var(--r-sm);color:var(--text-2);margin-top:4px"><em>' + escape(t.notes) + '</em></div>' : '') +
    '</div>';

  document.querySelectorAll('input[name="decision"]').forEach(function(r){ r.checked = r.value === 'Approved'; });
  openModal('approvalModal');
}

function submitApproval() {
  var taskId   = document.getElementById('approvalTaskId').value;
  var decision = document.querySelector('input[name="decision"]:checked');
  var remarks  = document.getElementById('approvalRemarks').value.trim();
  if (!decision) { toast('Please select a decision.','warning'); return; }

  showLoading('Submitting decision…');
  closeModal('approvalModal');

  runServer('approveTask', [taskId, decision.value, remarks]).then(function(r) {
    hideLoading();
    if (r && r.success) {
      toast(decision.value === 'Approved' ? 'Task approved ✓' : 'Task sent back for rework',
            decision.value === 'Approved' ? 'success' : 'warning');
      if (decision.value === 'Approved') {
        _patchTask_(taskId, { approvalStatus: 'Approved' });
      } else {
        _patchTask_(taskId, { approvalStatus: 'Rejected', status: 'In Progress' });
      }
      _scheduleQuietRefresh_();
    } else {
      toast('Error: '+(r&&r.error||'Unknown'),'error');
    }
  }).catch(function(e){ hideLoading(); toast('Error: '+(e&&e.message),'error'); });
}

// ─── COMPLETED PROJECTS ──────────────────────────────────────────────────────

function loadCompletedProjects() {
  var container = document.getElementById('completedProjectsContainer');
  if (container) container.innerHTML = skeletonCards(3);

  runServer('getCompletedProjects').then(function(projects) {
    renderCompletedProjects(projects);
  }).catch(function() {
    if (container) container.innerHTML = emptyState('fa-circle-exclamation','Error loading','Please refresh');
  });
}

function renderCompletedProjects(projects) {
  var statsRow  = document.getElementById('completedStatsRow');
  var container = document.getElementById('completedProjectsContainer');

  if (!projects || projects.length === 0) {
    if (statsRow)  statsRow.innerHTML  = '';
    if (container) container.innerHTML = emptyState('fa-trophy','No completed projects yet','Projects appear here when all tasks are approved');
    return;
  }

  var onTime = 0, late = 0;
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].deliveredOnTime === true)  onTime++;
    if (projects[i].deliveredOnTime === false) late++;
  }

  if (statsRow) {
    statsRow.innerHTML =
      kpiMini(projects.length,'Total Completed') +
      kpiMini(onTime,'On Time','color:var(--green)') +
      (late > 0 ? kpiMini(late,'Late','color:var(--red)') : '');
  }

  var cards = [];
  for (var i = 0; i < projects.length; i++) {
    var p  = projects[i];
    var ot = p.deliveredOnTime === true;
    cards.push(
      '<div class="completed-card">' +
      '<div class="cc-header">' +
        '<div>' +
          '<div class="cc-title">' + escape(p.name) + '</div>' +
          '<div class="cc-client"><i class="fas fa-briefcase" style="color:var(--blue)"></i>' + escape(p.client||'—') +
          ' <span class="badge badge-member" style="font-size:10px">' + escape(p.clientType||'') + '</span></div>' +
        '</div>' +
        (p.deliveredOnTime !== null
          ? '<span class="on-time-chip ' + (ot?'yes':'late') + '"><i class="fas ' + (ot?'fa-check':'fa-clock') + '"></i>' + (ot?'On Time':'Late') + '</span>'
          : '') +
      '</div>' +
      '<div class="prog-bar"><div class="prog-fill prog-green" style="width:100%"></div></div>' +
      '<div style="font-size:11px;text-align:right;color:var(--green);font-weight:600;margin-top:4px">' + p.completedTasks + '/' + p.totalTasks + ' tasks complete</div>' +
      '<div class="cc-meta">' +
        (p.completedDate ? '<span><i class="fas fa-calendar-check"></i>' + p.completedDate + '</span>' : '') +
        '<span><i class="fas fa-user-tie"></i>' + escape(p.manager||'—') + '</span>' +
        (p.deadline ? '<span><i class="fas fa-flag-checkered"></i>Deadline: ' + fmtDate(p.deadline) + '</span>' : '') +
      '</div>' +
      '</div>'
    );
  }

  if (container) container.innerHTML = '<div class="completed-grid">' + cards.join('') + '</div>';
}

function kpiMini(val, lbl, style) {
  return '<div class="kpi-mini"><div class="kpi-mini-val" ' + (style?'style="'+style+'"':'') + '>' + val + '</div><div class="kpi-mini-lbl">' + lbl + '</div></div>';
}

// ─── REASSIGN TASK ────────────────────────────────────────────────────────────

function openReassignModal(taskId) {
  var t = null;
  for (var i = 0; i < allTasks.length; i++) { if (allTasks[i].id === taskId) { t = allTasks[i]; break; } }
  if (!t) { toast('Task not found.', 'error'); return; }

  document.getElementById('reassignTaskId').value         = taskId;
  document.getElementById('reassignTaskName').textContent  = t.name || '';
  document.getElementById('reassignCurrentAssignee').value = t.assignedTo || '(Unassigned)';

  // Populate reassign dropdown with all team members, excluding current assignee
  var sel  = document.getElementById('reassignNewAssignee');
  var first = '<option value="">Select team member…</option>';
  var opts  = '';
  allTeams.forEach(function(m) {
    opts += '<option value="' + escape(m.name) + '">' + escape(m.name) + '</option>';
  });
  sel.innerHTML = first + opts;

  openModal('reassignModal');
}

function submitReassign() {
  var taskId      = document.getElementById('reassignTaskId').value;
  var newAssignee = document.getElementById('reassignNewAssignee').value;
  if (!newAssignee) { toast('Please select a team member to reassign to.', 'warning'); return; }

  closeModal('reassignModal');
  showLoading('Reassigning task…');

  runServer('reassignTask', [taskId, newAssignee]).then(function(r) {
    hideLoading();
    if (r && r.success) {
      toast('Task reassigned to ' + newAssignee, 'success');
      _patchTask_(taskId, { assignedTo: newAssignee });
      _scheduleQuietRefresh_();
    } else {
      toast('Error: ' + (r && r.error || 'Unknown'), 'error');
    }
  }).catch(function(e) { hideLoading(); toast('Error: ' + (e && e.message), 'error'); });
}

// ─── TASK ATTACHMENTS ─────────────────────────────────────────────────────────

function loadTaskAttachments(taskId) {
  runServer('getTaskAttachments', [taskId])
    .then(function(attachments) { renderAttachmentsList(attachments || []); })
    .catch(function() { renderAttachmentsList([]); });
}

function renderAttachmentsList(attachments) {
  var list = document.getElementById('taskAttachmentsList');
  if (!list) return;

  if (!attachments || attachments.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-4);padding:4px 0;">No files attached yet. Use the Upload button above.</div>';
    return;
  }

  var html = '';
  attachments.forEach(function(a) {
    var ext  = (a.fileName || '').split('.').pop().toUpperCase().slice(0, 4);
    var canDel = currentUser.role === 'Admin' || currentUser.role === 'Team Leader' ||
                 (a.uploadedBy || '').toLowerCase() === (currentUser.name  || '').toLowerCase() ||
                 (a.uploadedBy || '').toLowerCase() === (currentUser.email || '').toLowerCase();

    html +=
      '<div class="attach-item">' +
        '<span style="font-size:10px;font-weight:700;background:var(--blue-pale);color:var(--blue);' +
          'padding:2px 6px;border-radius:4px;flex-shrink:0;">' + escape(ext) + '</span>' +
        '<span class="attach-item-name" title="' + escape(a.fileName) + '">' + escape(a.fileName) + '</span>' +
        '<span class="attach-item-meta">' + escape(a.uploadedBy || '') + '</span>' +
        '<a href="' + a.viewUrl + '" target="_blank" class="act-btn" title="Open file" style="text-decoration:none;">' +
          '<i class="fas fa-arrow-up-right-from-square"></i></a>' +
        (canDel
          ? '<button class="act-btn act-btn-delete" onclick="deleteTaskAttachment(\'' + escape(a.id) + '\',\'' + escape(a.fileName).replace(/'/g,"\\'") + '\')" title="Delete attachment"><i class="fas fa-trash"></i></button>'
          : '') +
      '</div>';
  });
  list.innerHTML = html;
}

function uploadTaskAttachment(inputEl) {
  var file    = inputEl.files && inputEl.files[0];
  if (!file) return;

  var taskId = document.getElementById('taskId').value;
  if (!taskId) { toast('Save the task first before uploading attachments.', 'warning'); return; }

  if (file.size > 25 * 1024 * 1024) { toast('File exceeds 25 MB limit.', 'error'); return; }

  var list = document.getElementById('taskAttachmentsList');
  if (list) list.innerHTML = '<div style="font-size:12px;color:var(--text-3);padding:4px 0"><i class="fas fa-spinner fa-spin"></i> Uploading…</div>';

  // Capture the selected approver before the async read begins
  var attachApproverEl = document.getElementById('attachApprover');
  var selectedApprover = attachApproverEl ? attachApproverEl.value : '';

  var reader = new FileReader();
  reader.onload = function(e) {
    var b64    = e.target.result.split(',')[1]; // strip "data:mime;base64,"
    var projId = document.getElementById('taskProjectId').value || '';
    runServer('addAttachment', [taskId, projId, file.name, b64, file.type])
      .then(function(r) {
        if (r && r.success) {
          toast('File uploaded: ' + file.name, 'success');
          // If a specific reviewer was chosen, update the task's approver field silently
          if (selectedApprover) {
            runServer('setTaskApprover', [taskId, selectedApprover]).then(function(ar) {
              if (ar && ar.success) {
                // Update local allTasks so the stamp icon shows immediately
                _patchTask_(taskId, { taskApprover: selectedApprover });
              }
            }).catch(function() {});
          }
          loadTaskAttachments(taskId);
        } else {
          toast('Upload failed: ' + (r && r.error || 'Unknown'), 'error');
          loadTaskAttachments(taskId);
        }
      })
      .catch(function(err) {
        toast('Upload error: ' + (err && err.message), 'error');
        loadTaskAttachments(taskId);
      });
  };
  reader.readAsDataURL(file);
  // Reset input so same file can be re-uploaded if needed
  inputEl.value = '';
}

function deleteTaskAttachment(attachmentId, fileName) {
  confirmDelete('Delete attachment "' + fileName + '"?', function() {
    var taskId = document.getElementById('taskId').value;
    runServer('deleteAttachment', [attachmentId]).then(function(r) {
      if (r && r.success) {
        toast('Attachment deleted.', 'success');
        if (taskId) loadTaskAttachments(taskId);
      } else {
        toast('Error: ' + (r && r.error), 'error');
      }
    }).catch(function(e) { toast('Error: ' + (e && e.message), 'error'); });
  });
}
</script>
