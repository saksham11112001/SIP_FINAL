// ─── PROMISE WRAPPER ─────────────────────────────────────────────────────────

function runServer(fnName, args, _retryCount) {
  _retryCount = _retryCount || 0;
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(err) {
        if (_retryCount < 1) {
          setTimeout(function() {
            runServer(fnName, args, _retryCount + 1).then(resolve).catch(reject);
          }, 1200);
        } else {
          reject(err);
        }
      });
    if (args && args.length > 0) {
      runner[fnName].apply(runner, args);
    } else {
      runner[fnName]();
    }
  });
}

function loadCurrentUser() {
  // Keep app shell invisible while auth + dashboard are loading
  var appEl = document.getElementById('app');
  if (appEl) appEl.style.opacity = '0';

  google.script.run
    .withSuccessHandler(function(user) {
      // ── COLD-START RETRY ───────────────────────────────────────────────────
      if (user && user.accessDenied && !_authRetried &&
          user.reason && user.reason.indexOf('email could not be detected') !== -1) {
        _authRetried = true;
        setTimeout(loadCurrentUser, 2000);
        return;
      }

      // ── ACCESS DENIED ──────────────────────────────────────────────────────
      if (user && user.accessDenied) {
        _hideWelcomeLoader_();
        _showAccessDenied(user);
        return;
      }

      // ── GRANTED ─────────────────────────────────────────────────────────────
      currentUser = user;
      // Reveal app shell behind the still-visible welcome loader
      if (appEl) appEl.style.opacity = '';

      var initials = (user.name || '?').split(' ').map(function(n){ return n[0]; }).join('').toUpperCase().slice(0,2);
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent   = user.name || user.email || 'User';

      var pill = document.getElementById('userRolePill');
      pill.textContent = user.role;
      // Role pill styling
      pill.className = 'user-role-pill';
      if (user.role === 'Admin')        pill.classList.add('admin');
      if (user.role === 'Team Leader')  pill.classList.add('leader');

      document.getElementById('topbarUserMeta').innerHTML =
        '<i class="fas fa-user-circle"></i> ' + (user.name || user.email || '') +
        ' <span class="badge badge-member" style="font-size:10px;margin-left:4px;">' + user.role + '</span>';

      // Apply role-based sidebar visibility
      _applyRoleVisibility_(user.role);

      // Start dashboard load — loader stays visible until dashboard signals ready
      showPage('dashboard', document.getElementById('nav-dashboard'));
    })
    .withFailureHandler(function(err) {
      _hideWelcomeLoader_();
      _showAccessDenied({
        email       : '',
        accessDenied: true,
        reason      : 'Could not connect to the server. ' +
                      (err && err.message ? err.message : 'Please refresh the page.')
      });
    })
    .getCurrentUser();
}

function showPage(pageId, navEl, forceReload) {
  // Guard: check if this page is allowed for current role
  var role    = (currentUser && currentUser.role) || '';
  var allowed = _ROLE_PAGES[role] || [];
  // Allow if no role yet (auth still in progress) or if page is permitted
  if (role && allowed.length && allowed.indexOf(pageId) === -1) {
    // Redirect to first allowed page instead
    pageId = allowed[0] || 'dashboard';
  }

  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });

  var page = document.getElementById('page-' + pageId);
  if (page) page.classList.add('active');

  var navItem = navEl || document.getElementById('nav-' + pageId);
  if (navItem) navItem.classList.add('active');

  document.getElementById('pageTitle').textContent = PAGE_TITLES[pageId] || pageId;
  currentPage = pageId;

  var userExplicitClick = !!navEl;
  if (_pageLoaded[pageId] && !forceReload && !userExplicitClick) return;
  _pageLoaded[pageId] = true;

  if      (pageId === 'dashboard')  loadDashboard();
  else if (pageId === 'projects')   loadProjectsPage();
  else if (pageId === 'completed')  loadCompletedProjects();
  else if (pageId === 'health')     loadHealthPage();
  else if (pageId === 'gantt')      loadGanttPage();
  else if (pageId === 'teams')      loadTeamPerformance();
  else if (pageId === 'clients')    loadClients();
  else if (pageId === 'audit')      loadAuditLog();
}

function fmtDate(s) {
  if (!s) return '—';
  var d = _parseDate_(s);  // handles DD/MM/YYYY, strips time component
  if (!d) return String(s).replace(/\s+\d{1,2}:\d{2}.*$/, '').trim() || '—';
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}

// ─── Shared robust date parser ────────────────────────────────────────────────
// getProjects() uses sheetDisplayValues() so dates arrive as locale strings,
// e.g. "01/04/2026" or "01-04-2026" (DD/MM/YYYY in Indian locale).
// new Date() cannot parse these reliably in Chrome.
// This function handles ISO, MM/DD/YYYY, DD/MM/YYYY, DD-MM-YYYY, and common
// human-readable formats, and is used by every date utility in the frontend.
function _parseDate_(s) {
  if (!s) return null;
  // Strip any time component first — Sheets display values can include " 17:00" or " 17:00:00"
  s = String(s).trim().replace(/\s+\d{1,2}:\d{2}(:\d{2})?(\s*(AM|PM))?$/i, '').trim();
  if (!s) return null;

  // 1. Standard parse (ISO "YYYY-MM-DD", "Month D YYYY", M/D/YYYY etc.)
  var d = new Date(s);
  if (!isNaN(d.getTime())) { d.setHours(0, 0, 0, 0); return d; }

  // 2. DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY (Indian locale display values)
  var m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) {
    var a = parseInt(m[1], 10), b = parseInt(m[2], 10), y = parseInt(m[3], 10);
    if (y < 100) y += 2000;
    // Prefer DD/MM/YYYY (Indian): a=day, b=month
    if (a >= 1 && a <= 31 && b >= 1 && b <= 12) {
      var d1 = new Date(y, b - 1, a);
      if (!isNaN(d1.getTime())) { d1.setHours(0, 0, 0, 0); return d1; }
    }
    // Fallback MM/DD/YYYY: a=month, b=day
    if (a >= 1 && a <= 12 && b >= 1 && b <= 31) {
      var d2 = new Date(y, a - 1, b);
      if (!isNaN(d2.getTime())) { d2.setHours(0, 0, 0, 0); return d2; }
    }
  }

  // 3. "01 Apr 2026", "Apr 01 2026", "1-Apr-2026" etc. — normalise and retry
  var d3 = new Date(s.replace(/[\.\-]/g, ' '));
  if (!isNaN(d3.getTime())) { d3.setHours(0, 0, 0, 0); return d3; }

  return null;
}

function toInputDate(s) {
  if (!s) return '';
  var d = _parseDate_(s);
  if (!d) return '';
  // Build YYYY-MM-DD in LOCAL time (avoids UTC-midnight off-by-one in IST)
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

function daysFromToday(s) {
  if (!s) return null;
  var d = _parseDate_(s);
  if (!d) return null;
  var t = new Date(); t.setHours(0, 0, 0, 0);
  return Math.ceil((d - t) / 86400000);
}

function isOverdue(s, status) {
  if (!s || status === 'Completed') return false;
  return daysFromToday(s) < 0;
}

function dueDaysLabel(s, status) {
  if (status === 'Completed') return '';
  var d = daysFromToday(s);
  if (d === null) return '';
  if (d < 0)  return '<span class="overdue-meta"><i class="fas fa-circle-exclamation"></i> ' + Math.abs(d) + 'd overdue</span>';
  if (d === 0) return '<span style="color:var(--amber);font-weight:600"><i class="fas fa-clock"></i> Due today</span>';
  if (d <= 3)  return '<span style="color:var(--amber)"><i class="fas fa-clock"></i> ' + d + 'd left</span>';
  return '<i class="fas fa-calendar-days"></i> ' + d + 'd';
}

var _msState = {};

function initMultiSelect(wrapperId, items, selectedValues, options) {
  var wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  options        = options        || {};
  selectedValues = selectedValues || [];
  _msState[wrapperId] = {

function _msBuildHTML(id) {
  var s   = _msState[id];
  var sel = s.selected;
  var chipsHtml = '';
  for (var i = 0; i < sel.length; i++) {
    chipsHtml +=
      '<span class="ms-chip">' +
        '<span style="overflow:hidden;text-overflow:ellipsis">' + escape(sel[i]) + '</span>' +
        '<span class="ms-chip-remove" data-val="' + escape(sel[i]) + '" onclick="msRemoveChip(\'' + id + '\',this);event.stopPropagation()"><i class="fas fa-times"></i></span>' +
      '</span>';
  }
  var placeholder = sel.length === 0
    ? '<span class="ms-placeholder">' + escape(s.placeholder) + '</span>' : '';
  // Always show search input — even in single-select after a value is chosen
  var searchInput = '<input class="ms-search" id="' + id + '_search" type="text" placeholder="Type to search…" autocomplete="off" oninput="msFilter(\'' + id + '\')" onfocus="msOpen(\'' + id + '\')" onclick="event.stopPropagation()">';
  var boxHtml = '<div class="ms-box" id="' + id + '_box" onclick="msToggle(\'' + id + '\')">' + chipsHtml + placeholder + searchInput + '</div>';
  var optsHtml = '';
  for (var j = 0; j < s.items.length; j++) {
    var v = s.items[j];
    var isSel = sel.indexOf(v) !== -1;
    optsHtml += '<div class="ms-option ' + (isSel?'selected':'') + '" data-val="' + escape(v) + '" onclick="msToggleOption(\'' + id + '\',this)">' +
      '<span class="ms-check">' + (isSel?'<i class="fas fa-check"></i>':'') + '</span>' + escape(v) + '</div>';
  }
  if (!optsHtml) optsHtml = '<div class="ms-empty">No options available</div>';
  return boxHtml + '<div class="ms-dropdown" id="' + id + '_drop">' + optsHtml + '</div>';
}

function _msBindEvents(id) {
  document.addEventListener('click', function(e) {
    var wrap = document.getElementById(id);
    if (wrap && !wrap.contains(e.target)) msClose(id);
  });
}

function msToggle(id) {
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var isOpen = wrap.classList.contains('open');
  document.querySelectorAll('.ms-wrap.open').forEach(function(w) { if (w.id !== id) w.classList.remove('open'); });
  if (isOpen) { wrap.classList.remove('open'); }
  else {
    wrap.classList.add('open');
    var search = document.getElementById(id + '_search');
    if (search) { search.value = ''; msFilter(id); search.focus(); }
  }
}

function msOpen(id) {
  var wrap = document.getElementById(id);
  if (!wrap) return;
  document.querySelectorAll('.ms-wrap.open').forEach(function(w) { if (w.id !== id) w.classList.remove('open'); });
  wrap.classList.add('open');
}

function msClose(id) {
  var wrap = document.getElementById(id);
  if (wrap) wrap.classList.remove('open');
}

function msToggleOption(id, optEl) {
  var s   = _msState[id];
  var val = optEl.getAttribute('data-val');
  var idx = s.selected.indexOf(val);
  if (idx !== -1) { s.selected.splice(idx, 1); }
  else { if (s.single) { s.selected = [val]; } else { s.selected.push(val); } }
  var wrap = document.getElementById(id);
  var wasOpen = wrap && wrap.classList.contains('open');
  wrap.innerHTML = _msBuildHTML(id);
  if (wasOpen && !s.single) { wrap.classList.add('open'); var sr = document.getElementById(id+'_search'); if(sr) sr.focus(); }
  else if (s.single) msClose(id);
  if (s.callback) s.callback();
}

function msRemoveChip(id, chipEl) {
  var s = _msState[id];
  var val = chipEl.getAttribute('data-val');
  var idx = s.selected.indexOf(val);
  if (idx !== -1) s.selected.splice(idx, 1);
  var wrap = document.getElementById(id);
  var isOpen = wrap && wrap.classList.contains('open');
  wrap.innerHTML = _msBuildHTML(id);
  if (isOpen) wrap.classList.add('open');
  if (s.callback) s.callback();
}

function msFilter(id) {
  var search = document.getElementById(id + '_search');
  if (!search) return;
  var q    = search.value.toLowerCase();
  var drop = document.getElementById(id + '_drop');
  if (!drop) return;
  var opts = drop.querySelectorAll('.ms-option');
  opts.forEach(function(opt) {
    var v = (opt.getAttribute('data-val') || '').toLowerCase();
    opt.style.display = (!q || v.indexOf(q) !== -1) ? '' : 'none';
  });
}

function getMultiSelectValues(id) {
  var s = _msState[id];
  return s ? s.selected.slice() : [];
}

function getMultiSelectString(id) {
  return getMultiSelectValues(id).join(', ');
}

function setMultiSelectValues(id, valuesArray) {
  var s = _msState[id];
  if (!s) return;
  s.selected = (valuesArray || []).filter(function(v){ return v && v.trim(); });
  var wrap   = document.getElementById(id);
  var isOpen = wrap && wrap.classList.contains('open');
  if (wrap) { wrap.innerHTML = _msBuildHTML(id); if (isOpen) wrap.classList.add('open'); }
}

function refreshMultiSelectItems(id, items) {
  var s = _msState[id];
  if (!s) return;
  s.items = items.slice();
  var wrap   = document.getElementById(id);
  var isOpen = wrap && wrap.classList.contains('open');
  if (wrap) { wrap.innerHTML = _msBuildHTML(id); if (isOpen) wrap.classList.add('open'); }
}

// Register a change callback for a multi-select. Called after every selection change.
function _msOnChange(id, fn) {
  if (_msState[id]) _msState[id].callback = fn;
}
</script>
